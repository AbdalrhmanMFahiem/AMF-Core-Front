<div class="relative p-6 bg-white z-1 dark:bg-gray-900 sm:p-0">
  <div class="relative flex flex-col justify-center w-full h-screen lg:flex-row dark:bg-gray-900 sm:p-0">
    <ng-content></ng-content>
    <div class="items-center hidden w-full h-full lg:w-1/2 bg-brand-950 dark:bg-white/5 lg:grid relative">
      <div class="flex items-center justify-center z-1">
        <!-- ===== Common Grid Shape Start ===== -->
        <app-grid-shape />
        <div class="flex flex-col items-center max-w-md relative z-10 px-8">
          <!-- Subtle background glow behind the logo -->
          <div
            class="absolute top-1/4 left-1/2 -translate-x-1/2 -translate-y-1/2 w-48 h-48 bg-brand-500/30 rounded-full blur-[80px] pointer-events-none">
          </div>

          <a routerLink="/" class="block mb-8 relative transition-transform hover:scale-105 duration-300">
            <img class="h-60 w-auto object-contain drop-shadow-[0_10px_20px_rgba(0,0,0,0.5)]"
              src="/images/logo/AMF-Core-Icon-tans.png" alt="AMF Core Logo" />
          </a>

          <p class="text-center text-lg text-white/90 mb-8 leading-relaxed font-medium drop-shadow-sm">
            {{ 'login.description' | translate }}
          </p>

          <div
            class="inline-flex items-center gap-2 px-5 py-2 rounded-full bg-brand-500/10 border border-brand-500/20 backdrop-blur-sm text-sm font-bold text-brand-300 shadow-[0_0_20px_rgba(0,0,0,0.2)]">
            <svg class="w-4 h-4 text-brand-400 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z">
              </path>
            </svg>
            <span>{{ 'login.comingSoon' | translate }}</span>
          </div>
        </div>
      </div>
    </div>
    <div
      class="fixed z-50 hidden bottom-6 right-6 sm:flex sm:flex-col sm:items-center sm:gap-4 ltr:right-6 rtl:left-6 rtl:right-auto">
      <app-language-dropdown sizeClass="size-14" [openUp]="true" />
      <app-theme-toggle-two />
    </div>
  </div>
</div>
