<app-modal [isOpen]="isOpen" (close)="onClose()" [className]="'max-w-3xl'">
  <div class="px-6 py-4 border-b border-gray-100 dark:border-white/5 flex justify-between items-center bg-white dark:bg-gray-900 rounded-t-2xl">
    <h3 class="text-lg font-medium text-gray-800 dark:text-white/90">
      {{ 'items.selectItem' | translate }}
    </h3>
    <button (click)="onClose()" class="text-gray-400 hover:text-gray-500 focus:outline-none">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="p-6 bg-white dark:bg-gray-900 rounded-b-2xl">
    <!-- Search -->
    <div class="mb-4">
      <input type="text" [(ngModel)]="searchTerm" (keyup.enter)="onSearch()" [placeholder]="'Common.SearchPlaceholder' | translate"
        class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800" />
    </div>

    <!-- Table -->
    <div class="overflow-hidden rounded-xl border border-gray-200 bg-white dark:border-white/5 dark:bg-white/3">
      <div class="max-h-96 overflow-y-auto">
        <table class="min-w-full">
          <thead class="border-b border-gray-100 dark:border-white/5 sticky top-0 bg-gray-50 dark:bg-gray-800 z-10">
            <tr>
              <th class="px-5 py-3 font-medium text-gray-500 text-start text-theme-xs dark:text-gray-400 uppercase">
                {{ 'items.fields.code' | translate }}
              </th>
              <th class="px-5 py-3 font-medium text-gray-500 text-start text-theme-xs dark:text-gray-400 uppercase">
                {{ 'items.fields.name' | translate }}
              </th>
              <th class="px-5 py-3 font-medium text-gray-500 text-start text-theme-xs dark:text-gray-400 uppercase">
                {{ 'items.fields.stock' | translate }}
              </th>
              <th class="px-5 py-3 font-medium text-gray-500 text-center text-theme-xs dark:text-gray-400 uppercase">
                {{ 'Common.Actions' | translate }}
              </th>
            </tr>
          </thead>
          <tbody class="divide-y divide-gray-100 dark:divide-white/5">
            <tr *ngIf="loading">
              <td colspan="4" class="px-5 py-8 text-center text-gray-500 dark:text-gray-400">
                <div class="flex justify-center"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div></div>
              </td>
            </tr>
            <tr *ngIf="!loading && items.length === 0">
              <td colspan="4" class="px-5 py-8 text-center text-gray-500 dark:text-gray-400">
                {{ 'Common.NoRecordsFound' | translate }}
              </td>
            </tr>
            <tr *ngFor="let item of items" class="hover:bg-gray-50 dark:hover:bg-white/5 transition-colors">
              <td class="px-5 py-3 text-sm text-gray-800 dark:text-white/90 font-mono">{{ item.code }}</td>
              <td class="px-5 py-3 text-sm text-gray-800 dark:text-white/90">{{ item.name }}</td>
              <td class="px-5 py-3 text-sm text-gray-800 dark:text-white/90">{{ item.stock || 0 }}</td>
              <td class="px-5 py-3 text-center">
                <button (click)="onSelect(item)" class="px-3 py-1.5 text-xs font-medium text-brand-600 bg-brand-50 hover:bg-brand-100 rounded-md dark:text-brand-400 dark:bg-brand-500/10 dark:hover:bg-brand-500/20 transition-colors">
                  {{ 'Common.Select' | translate }}
                </button>
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</app-modal>
