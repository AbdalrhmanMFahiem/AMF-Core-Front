<div class="relative">
  <button (click)="toggleDropdown()" [ngClass]="['flex items-center justify-center text-gray-500 border-gray-200 rounded-full dropdown-toggle bg-gray-50 hover:bg-gray-100 hover:text-gray-700 dark:border-gray-800 dark:bg-white/3 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300', sizeClass]">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"></circle>
      <line x1="2" y1="12" x2="22" y2="12"></line>
      <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
    </svg>
  </button>

  <app-dropdown [isOpen]="isOpen" (close)="closeDropdown()"
    [className]="'absolute right-0 flex w-[150px] flex-col rounded-2xl border border-gray-200 bg-white p-2 shadow-theme-lg dark:border-gray-800 dark:bg-gray-dark ' + (openUp ? 'bottom-full mb-2' : 'mt-[17px]')">
    <ul class="flex flex-col gap-1">
      <li>
        <button (click)="changeLanguage('en')"
          class="flex items-center w-full gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
          [class.bg-gray-100]="currentLang === 'en'"
          [class.dark:bg-white/5]="currentLang === 'en'">
          English
        </button>
      </li>
      <li>
        <button (click)="changeLanguage('ar')"
          class="flex items-center w-full gap-3 px-3 py-2 font-medium text-gray-700 rounded-lg group text-theme-sm hover:bg-gray-100 dark:text-gray-400 dark:hover:bg-white/5 dark:hover:text-gray-300"
          [class.bg-gray-100]="currentLang === 'ar'"
          [class.dark:bg-white/5]="currentLang === 'ar'">
          العربية
        </button>
      </li>
    </ul>
  </app-dropdown>
</div>
