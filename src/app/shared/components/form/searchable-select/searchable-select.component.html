<div class="relative w-full text-sm">
  <!-- Trigger Button -->
  <div (click)="toggleDropdown()" [ngClass]="{
      'border-brand-500 ring-3 ring-brand-500/10 dark:border-brand-500': isOpen,
      'border-gray-300 dark:border-gray-700': !isOpen,
      'opacity-50 cursor-not-allowed': disabled,
      'cursor-pointer': !disabled
    }"
    class="flex items-center justify-between h-11 w-full rounded-lg border bg-transparent px-4 py-2.5 shadow-theme-xs transition-all dark:bg-gray-900 focus:outline-hidden">
    <!-- Selected Value or Placeholder -->
    <div class="flex-1 truncate pr-4">
      <span *ngIf="selectedLabel" class="text-gray-800 dark:text-white/90 font-medium">
        {{ selectedLabel }}
      </span>
      <span *ngIf="!selectedLabel" class="text-gray-400 dark:text-gray-500">
        {{ placeholder | translate }}
      </span>
    </div>

    <!-- Right Side Actions (Clear & Caret) -->
    <div class="flex items-center gap-1">
      <!-- Clear Button -->
      <button *ngIf="allowClear && selectedLabel && !disabled" (click)="clearSelection($event)"
        class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 p-1 focus:outline-hidden transition-colors rounded-md"
        type="button">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>

      <!-- Caret Icon -->
      <div class="text-gray-400">
        <svg class="w-5 h-5 transition-transform duration-200" [ngClass]="{'rotate-180': isOpen}" fill="none"
          stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M19 9l-7 7-7-7" />
        </svg>
      </div>
    </div>
  </div>

  <!-- Dropdown Menu -->
  <div *ngIf="isOpen"
    class="absolute left-0 z-50 w-full mt-1 bg-white border border-gray-200 rounded-lg shadow-xl dark:bg-gray-800 dark:border-gray-700 animate-in fade-in zoom-in-95 duration-100">
    <!-- Search Input -->
    <div class="p-2 border-b border-gray-100 dark:border-gray-700/50">
      <div class="relative">
        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-gray-400">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
        </div>
        <input type="text" [(ngModel)]="searchText" (click)="$event.stopPropagation()"
          [placeholder]="searchPlaceholder | translate"
          class="block w-full pl-9 pr-3 py-2 text-sm text-gray-800 bg-gray-50 border border-gray-200 rounded-md focus:ring-brand-500 focus:border-brand-500 dark:bg-gray-900/50 dark:border-gray-700 dark:placeholder-gray-400 dark:text-white">
      </div>
    </div>

    <!-- Options List -->
    <ul class="max-h-60 overflow-y-auto py-1 custom-scrollbar">
      <li *ngFor="let option of filteredOptions" (click)="selectOption(option.value, $event)"
        class="px-4 py-2 cursor-pointer transition-colors" [ngClass]="{
          'bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 font-medium': option.value === value,
          'text-gray-700 dark:text-gray-300 hover:bg-gray-50 dark:hover:bg-white/5': option.value !== value
        }">
        <div class="flex items-center justify-between">
          <span>{{ option.label }}</span>
          <svg *ngIf="option.value === value" class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
          </svg>
        </div>
      </li>
      <li *ngIf="filteredOptions.length === 0" class="px-4 py-3 text-center text-gray-500 dark:text-gray-400">
        {{ 'common.noRecordsFound' | translate }}
      </li>
    </ul>
  </div>
</div>
