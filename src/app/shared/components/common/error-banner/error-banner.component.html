<div *ngIf="isVisible" class="fixed bottom-0 left-0 right-0 z-100 transform transition-all duration-300 ease-in-out"
  [ngClass]="isVisible ? 'translate-y-0 opacity-100' : 'translate-y-full opacity-0'">
  <div class="mx-auto max-w-4xl p-4 md:p-6">
    <div
      class="relative overflow-hidden rounded-xl border border-error-200 bg-error-50 p-4 shadow-lg dark:border-error-800/50 dark:bg-error-900/30">
      <div class="flex items-start">
        <div class="shrink-0">
          <svg class="h-6 w-6 text-error-500" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </div>
        <div class="ltr:ml-3 rtl:mr-3 w-0 flex-1 pt-0.5">
          <h3 class="text-sm font-medium text-error-800 dark:text-error-200">
            {{ 'common.errorTitle' | translate }}
          </h3>
          <div class="mt-2 text-sm text-error-700 dark:text-error-300">
            <ul role="list" class="list-disc space-y-1 ltr:pl-5 rtl:pr-5">
              <li *ngFor="let error of errors">{{ error }}</li>
            </ul>
          </div>
        </div>
        <div class="ltr:ml-4 rtl:mr-4 flex shrink-0">
          <button type="button" (click)="onClose()"
            class="inline-flex rounded-md bg-transparent text-error-500 hover:text-error-600 focus:outline-none focus:ring-2 focus:ring-error-500 focus:ring-offset-2 dark:hover:text-error-400">
            <span class="sr-only">Close</span>
            <svg class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
              <path
                d="M6.28 5.22a.75.75 0 00-1.06 1.06L8.94 10l-3.72 3.72a.75.75 0 101.06 1.06L10 11.06l3.72 3.72a.75.75 0 101.06-1.06L11.06 10l3.72-3.72a.75.75 0 00-1.06-1.06L10 8.94 6.28 5.22z" />
            </svg>
          </button>
        </div>
      </div>
      <!-- Progress Bar -->
      <div class="absolute bottom-0 left-0 right-0 h-1 w-full bg-error-200/50 dark:bg-error-800/50">
        <div class="h-full bg-error-500 dark:bg-error-400 animate-progress"
          [style.animation-duration.s]="countdownSeconds"></div>
      </div>
    </div>
  </div>
</div>
