<div class="flex flex-wrap items-center justify-between gap-3 mb-6 rtl:flex-row-reverse">
  <h2 class="text-xl font-semibold text-gray-800 dark:text-white/90">
    {{ pageTitle | translate }}
  </h2>
  <nav>
    <ol class="flex items-center gap-1.5">
      <li>
        <a
          class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-brand-500 dark:text-gray-400 dark:hover:text-brand-400 transition-colors"
          routerLink="/"
        >
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-4 0a1 1 0 01-1-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 01-1 1h-2z" />
          </svg>
          {{ 'Common.Home' | translate }}
        </a>
      </li>
      
      <ng-container *ngIf="parentPageTitle && parentPageUrl">
        <li class="text-gray-400 dark:text-gray-600">
          <svg class="stroke-current rtl:rotate-180" width="17" height="16" viewBox="0 0 17 16" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366" stroke="" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </li>
        <li>
          <a class="inline-flex items-center gap-1.5 text-sm text-gray-500 hover:text-brand-500 dark:text-gray-400 dark:hover:text-brand-400 transition-colors"
            [routerLink]="parentPageUrl">
            {{ parentPageTitle | translate }}
          </a>
        </li>
      </ng-container>

      <li class="text-gray-400 dark:text-gray-600">
        <svg
          class="stroke-current rtl:rotate-180"
          width="17"
          height="16"
          viewBox="0 0 17 16"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <path
            d="M6.0765 12.667L10.2432 8.50033L6.0765 4.33366"
            stroke=""
            stroke-width="1.2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </li>
      <li class="text-sm font-medium text-brand-500 dark:text-brand-400">
        {{ pageTitle | translate }}
      </li>
    </ol>
  </nav>
</div>
