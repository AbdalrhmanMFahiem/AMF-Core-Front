<app-modal [isOpen]="isOpen" [showCloseButton]="false" (close)="onClose()">
  <!-- Header -->
  <div
    class="flex items-center justify-between p-4 border-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800 rounded-t-lg">
    <h3 class="text-lg font-semibold text-gray-900 dark:text-white m-0">
      {{ title | translate }}
    </h3>
    <button type="button" (click)="onClose()"
      class="flex h-8 w-8 items-center justify-center rounded-full bg-gray-200 text-gray-500 transition-colors hover:bg-gray-300 hover:text-gray-800 dark:bg-gray-700 dark:text-gray-400 dark:hover:bg-gray-600 dark:hover:text-white focus:outline-none">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path fillRule="evenodd" clipRule="evenodd"
          d="M6.04289 16.5413C5.65237 16.9318 5.65237 17.565 6.04289 17.9555C6.43342 18.346 7.06658 18.346 7.45711 17.9555L11.9987 13.4139L16.5408 17.956C16.9313 18.3466 17.5645 18.3466 17.955 17.956C18.3455 17.5655 18.3455 16.9323 17.955 16.5418L13.4129 11.9997L17.955 7.4576C18.3455 7.06707 18.3455 6.43391 17.955 6.04338C17.5645 5.65286 16.9313 5.65286 16.5408 6.04338L11.9987 10.5855L7.45711 6.0439C7.06658 5.65338 6.43342 5.65338 6.04289 6.0439C5.65237 6.43442 5.65237 7.06759 6.04289 7.45811L10.5845 11.9997L6.04289 16.5413Z"
          fill="currentColor" />
      </svg>
      <span class="sr-only">{{ 'printPreview.close' | translate }}</span>
    </button>
  </div>

  <!-- Body -->
  <div class="p-4 space-y-4" style="height: 70vh;">
    <!-- Loading State -->
    <div *ngIf="loading" class="flex flex-col items-center justify-center h-full space-y-4">
      <div class="w-12 h-12 border-4 border-primary-600 border-t-transparent rounded-full animate-spin"></div>
      <p class="text-gray-500 dark:text-gray-400">{{ 'printPreview.loading' | translate }}</p>
    </div>

    <!-- PDF Viewer -->
    <div *ngIf="!loading && pdfBlobUrl"
      class="w-full h-full bg-gray-100 dark:bg-gray-900 rounded border border-gray-300 dark:border-gray-700 overflow-hidden">
      <iframe #pdfIframe [src]="safePdfUrl" class="w-full h-full border-none" title="PDF Preview">
      </iframe>
    </div>
  </div>

  <!-- Footer -->
  <div
    class="flex items-center justify-end p-4 border-t border-gray-200 rounded-b dark:border-gray-700 bg-gray-50 dark:bg-gray-800 space-x-3 rtl:space-x-reverse">
    <button type="button" (click)="onClose()"
      class="text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-700 dark:hover:border-gray-600 dark:focus:ring-gray-700">
      {{ 'printPreview.close' | translate }}
    </button>

    <button type="button" (click)="onDownloadPdf()" [disabled]="loading || !pdfBlobUrl"
      class="text-gray-900 bg-white border border-gray-300 focus:outline-none hover:bg-gray-100 focus:ring-4 focus:ring-gray-100 font-medium rounded-lg text-sm px-5 py-2.5 dark:bg-gray-800 dark:text-white dark:border-gray-600 dark:hover:bg-gray-700 dark:hover:border-gray-600 dark:focus:ring-gray-700 flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
      <svg class="w-4 h-4 me-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
          d="M12 13V4M7 14H5a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-4a1 1 0 0 0-1-1h-2m-1-5-4 5-4-5m9 8h.01" />
      </svg>
      {{ 'printPreview.downloadPdf' | translate }}
    </button>

    <button type="button" (click)="onPrint()" [disabled]="loading || !pdfBlobUrl"
      class="text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 flex items-center disabled:opacity-50 disabled:cursor-not-allowed">
      <svg class="w-4 h-4 me-2" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
        <path stroke="currentColor" stroke-linejoin="round" stroke-width="2"
          d="M16.4 7C16.5 6.1 15.8 5 15 5H9c-.8 0-1.5 1.1-1.4 2m7.8 0H18a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-1.6m-11.2-8H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h1.6M9 15h6v4H9v-4Z" />
      </svg>
      {{ 'printPreview.printDirect' | translate }}
    </button>
  </div>
</app-modal>
