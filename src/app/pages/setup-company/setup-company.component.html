<div class="min-h-screen bg-gray-50 flex flex-col justify-center py-12 sm:px-6 lg:px-8">
  <div class="sm:mx-auto sm:w-full sm:max-w-md">
    <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">
      Setup Your Company
    </h2>
    <p class="mt-2 text-center text-sm text-gray-600">
      You're almost there! Create your workspace to get started.
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow sm:rounded-lg sm:px-10">
      <form class="space-y-6" [formGroup]="form" (ngSubmit)="onSubmit()">
        
        <div *ngIf="errorMsg" class="rounded-md bg-red-50 p-4 mb-4">
          <div class="flex">
            <div class="ml-3">
              <h3 class="text-sm font-medium text-red-800">{{ errorMsg }}</h3>
            </div>
          </div>
        </div>

        <div>
          <label for="companyName" class="block text-sm font-medium text-gray-700">
            Company Name
          </label>
          <div class="mt-1">
            <input id="companyName" formControlName="companyName" type="text" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
              placeholder="Acme Corp">
          </div>
          <p *ngIf="form.get('companyName')?.invalid && form.get('companyName')?.touched" class="mt-2 text-sm text-red-600">
            Company name is required (min 3 characters).
          </p>
        </div>

        <div>
          <label for="mainBranchName" class="block text-sm font-medium text-gray-700">
            Main Branch Name
          </label>
          <div class="mt-1">
            <input id="mainBranchName" formControlName="mainBranchName" type="text" required
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
              placeholder="Headquarters">
          </div>
        </div>

        <div>
          <button type="submit" [disabled]="form.invalid || isLoading"
            class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50">
            {{ isLoading ? 'Setting up...' : 'Complete Setup' }}
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
