<app-page-breadcrumb [pageTitle]="'pages.UnitOfMeasure.Title'" />
<div class="space-y-6">
  <app-crud-list 
    [pageTitle]="'pages.UnitOfMeasure.Title'" 
    [searchPlaceholder]="'pages.UnitOfMeasure.SearchPlaceholder'"
    [addBtnText]="'pages.UnitOfMeasure.Add'"
    [columns]="columns" 
    [data]="data" 
    [filters]="filters"
    [includeDisabled]="includeDisabled"
    [isLoading]="loading"
    [hasAdvancedFilters]="true"
    [hasActiveAdvancedFilters]="hasActiveAdvancedFilters"
    [hideBuiltInSearch]="true"
    (search)="loadData()"
    (add)="onAdd()"
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (toggleStatus)="onToggleStatus($event)"
    (pageChange)="onPageChange($event)"
    (includeDisabledChange)="onIncludeDisabledChanged($event)"
    (refresh)="resetFilters()">

    <div custom-filters class="flex-1 w-full flex items-center gap-2">
      <input type="text" [(ngModel)]="filters.searchValue" (keyup.enter)="loadData()" [placeholder]="'pages.UnitOfMeasure.SearchPlaceholder' | translate" [disabled]="loading"
        class="dark:bg-dark-900 h-11 w-full sm:max-w-xs rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-50 disabled:cursor-not-allowed" />
    </div>

    <div advanced-filters class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
      <div>
        <label class="block text-xs font-medium text-gray-700 dark:text-gray-300 mb-1.5">{{ 'uom.uomType' | translate }}</label>
        <app-searchable-select [options]="uomTypeOptions" placeholder="common.all"
          [(ngModel)]="filters.type" (selectionChange)="loadData()"></app-searchable-select>
      </div>
      <div class="flex items-end">
        <button (click)="resetFilters()" class="w-full px-4 py-2 text-sm text-error-600 bg-error-50 hover:bg-error-100 rounded-lg transition-colors font-medium dark:bg-error-500/10 dark:text-error-400 dark:hover:bg-error-500/20">
          {{ 'common.reset' | translate }}
        </button>
      </div>
    </div>

    <ng-template #customColumn let-item let-col="col">
      <ng-container *ngIf="col.field === 'uomType'">
        <app-uom-type-badge [type]="item.uomType"></app-uom-type-badge>
      </ng-container>
    </ng-template>
  </app-crud-list>
</div>
