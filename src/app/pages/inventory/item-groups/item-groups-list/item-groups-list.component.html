<app-page-breadcrumb [pageTitle]="'Pages.ItemGroups.Title'" />
<div class="space-y-6">
  <app-crud-list 
    [pageTitle]="'Pages.ItemGroups.Title'" 
    [searchPlaceholder]="'Pages.ItemGroups.SearchPlaceholder'"
    [addBtnText]="'Pages.ItemGroups.Add'"
    [columns]="columns" 
    [data]="data" 
    [filters]="filters"
    [(includeDisabled)]="includeDisabled"
    (search)="loadData()"
    (add)="onAdd()"
    (view)="onView($event)"
    (edit)="onEdit($event)"
    (toggleStatus)="onToggleStatus($event)"
    (pageChange)="onPageChange($event)">
  </app-crud-list>
</div>
