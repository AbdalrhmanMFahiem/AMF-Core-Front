<app-page-breadcrumb 
  [pageTitle]="isEditMode ? ('locations.form.edit' | translate) : isViewMode ? ('locations.form.view' | translate) : ('locations.form.create' | translate)"
  [parentPageTitle]="'locations.list.title' | translate"
  parentPageUrl="/inventory/locations"
></app-page-breadcrumb>

<!-- Notifications -->
<app-success-redirect-banner
  [isVisible]="showSuccess"
  [message]="isEditMode ? ('locations.updateSuccess' | translate) : ('locations.addSuccess' | translate)"
  redirectUrl="/inventory/locations"
></app-success-redirect-banner>

<app-error-banner 
  [isVisible]="showError"
  [errors]="[errorMessage]"
  (close)="showError = false"
></app-error-banner>

<!-- Form Container -->
<div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mt-4" *ngIf="!loading">
  <!-- Header: Title & Code Badge -->
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center p-6 border-b border-gray-100 dark:border-gray-700 bg-gray-50/50 dark:bg-gray-800/50">
    <div class="flex items-center gap-3">
      <div class="w-10 h-10 rounded-lg bg-indigo-50 dark:bg-indigo-900/30 flex items-center justify-center border border-indigo-100 dark:border-indigo-800/50">
        <i class="fas fa-map-marker-alt text-indigo-600 dark:text-indigo-400 text-lg"></i>
      </div>
      <div>
        <h2 class="text-lg font-bold text-gray-900 dark:text-white">
          {{ isEditMode ? ('locations.form.edit' | translate) : isViewMode ? ('locations.form.view' | translate) : ('locations.form.create' | translate) }}
        </h2>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">{{ 'locations.subTitle' | translate }}</p>
      </div>
    </div>
    
    <!-- Code Badge -->
    <div class="mt-4 sm:mt-0 flex items-center gap-2 px-4 py-2 bg-white dark:bg-gray-900 rounded-lg border border-gray-200 dark:border-gray-700 shadow-sm">
      <span class="text-xs font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider">{{ 'locations.fields.code' | translate }}</span>
      <div class="w-px h-4 bg-gray-200 dark:bg-gray-700"></div>
      <span class="text-base font-bold text-gray-900 dark:text-white font-mono">{{ form.get('code')?.value }}</span>
    </div>
  </div>

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="p-6">
    <!-- Grid Layout -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
      
      <!-- Arabic Name -->
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
          {{ 'locations.fields.aName' | translate }} <span class="text-red-500 dark:text-red-400">*</span>
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
            <i class="fas fa-language text-gray-400 dark:text-gray-500"></i>
          </div>
          <input 
            type="text" 
            formControlName="aName"
            class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full ps-10 p-2.5 transition-colors disabled:opacity-60 disabled:bg-gray-100 dark:disabled:bg-gray-800"
            [placeholder]="'locations.fields.aNamePlaceholder' | translate"
            [class.border-red-500]="form.get('aName')?.invalid && form.get('aName')?.touched"
            [class.dark:border-red-500]="form.get('aName')?.invalid && form.get('aName')?.touched">
        </div>
        <div *ngIf="form.get('aName')?.invalid && form.get('aName')?.touched" class="text-red-500 dark:text-red-400 text-xs mt-1 font-medium">
          {{ 'validation.required' | translate }}
        </div>
      </div>

      <!-- English Name -->
      <div class="space-y-1.5">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
          {{ 'locations.fields.eName' | translate }}
        </label>
        <div class="relative">
          <div class="absolute inset-y-0 inset-s-0 flex items-center ps-3 pointer-events-none">
            <i class="fas fa-language text-gray-400 dark:text-gray-500"></i>
          </div>
          <input 
            type="text" 
            formControlName="eName"
            class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full ps-10 p-2.5 transition-colors disabled:opacity-60 disabled:bg-gray-100 dark:disabled:bg-gray-800"
            [placeholder]="'locations.fields.eNamePlaceholder' | translate">
        </div>
      </div>

      <!-- Parent Location -->
      <div class="space-y-1.5 md:col-span-2">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
          {{ 'locations.fields.parentLocation' | translate }}
        </label>
        <app-searchable-select
          formControlName="parentLocationId"
          [options]="parentLocations"
          [placeholder]="'locations.fields.parentLocationPlaceholder' | translate">
        </app-searchable-select>
      </div>

      <!-- Notes -->
      <div class="col-span-1 md:col-span-2 space-y-1.5 mt-2">
        <label class="block text-sm font-semibold text-gray-700 dark:text-gray-300">
          {{ 'Common.Notes' | translate }}
        </label>
        <textarea 
          formControlName="notes"
          rows="3"
          class="bg-gray-50 dark:bg-gray-900 border border-gray-300 dark:border-gray-600 text-gray-900 dark:text-white text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 block w-full p-2.5 transition-colors disabled:opacity-60 disabled:bg-gray-100 dark:disabled:bg-gray-800 resize-y"
          [placeholder]="'Common.NotesPlaceholder' | translate"></textarea>
      </div>
    </div>

    <!-- Actions Footer -->
    <div class="mt-8 pt-5 border-t border-gray-100 dark:border-gray-700 flex items-center justify-end gap-3" *ngIf="!isViewMode">
      <button 
        type="button" 
        (click)="onCancel()"
        class="px-5 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-4 focus:outline-none focus:ring-gray-100 dark:focus:ring-gray-700 transition-all shadow-sm">
        {{ 'Common.Cancel' | translate }}
      </button>
      <button 
        type="submit" 
        [disabled]="form.invalid || submitting"
        class="px-5 py-2.5 text-sm font-medium text-white bg-indigo-600 dark:bg-indigo-500 rounded-lg hover:bg-indigo-700 dark:hover:bg-indigo-600 focus:ring-4 focus:outline-none focus:ring-indigo-300 dark:focus:ring-indigo-800 disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm flex items-center gap-2">
        <i class="fas fa-spinner fa-spin" *ngIf="submitting"></i>
        <i class="fas fa-save" *ngIf="!submitting"></i>
        {{ (isEditMode ? 'Common.Save' : 'Common.Add') | translate }}
      </button>
    </div>
    
    <div class="mt-8 pt-5 border-t border-gray-100 dark:border-gray-700 flex items-center justify-end gap-3" *ngIf="isViewMode">
      <button 
        type="button" 
        (click)="onCancel()"
        class="px-5 py-2.5 text-sm font-medium text-gray-700 dark:text-gray-300 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 focus:ring-4 focus:outline-none focus:ring-gray-100 dark:focus:ring-gray-700 transition-all shadow-sm">
        {{ 'Common.Back' | translate }}
      </button>
    </div>
  </form>
</div>

<!-- Loading Skeleton -->
<div *ngIf="loading" class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 p-6 mt-4 animate-pulse">
  <div class="flex justify-between items-center mb-8 border-b border-gray-100 dark:border-gray-700 pb-6">
    <div class="flex items-center gap-4">
      <div class="w-10 h-10 bg-gray-200 dark:bg-gray-700 rounded-lg"></div>
      <div>
        <div class="h-5 bg-gray-200 dark:bg-gray-700 rounded-md w-32 mb-2"></div>
        <div class="h-3 bg-gray-200 dark:bg-gray-700 rounded-md w-48"></div>
      </div>
    </div>
    <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded-lg w-32"></div>
  </div>
  
  <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
    <div>
      <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-24 mb-3"></div>
      <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded-lg w-full"></div>
    </div>
    <div>
      <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-24 mb-3"></div>
      <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded-lg w-full"></div>
    </div>
    <div class="col-span-1 md:col-span-2">
      <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-32 mb-3"></div>
      <div class="h-10 bg-gray-200 dark:bg-gray-700 rounded-lg w-full"></div>
    </div>
    <div class="col-span-1 md:col-span-2">
      <div class="h-4 bg-gray-200 dark:bg-gray-700 rounded w-24 mb-3"></div>
      <div class="h-24 bg-gray-200 dark:bg-gray-700 rounded-lg w-full"></div>
    </div>
  </div>
</div>
