<app-page-breadcrumb [pageTitle]="pageTitle" />

<div class="space-y-6">

  <app-success-redirect-banner 
    [isVisible]="showSuccessBanner"
    [redirectUrl]="'/inventory/item-properties'"
    (stay)="showSuccessBanner = false"
  ></app-success-redirect-banner>

  <app-component-card [title]="pageTitle | translate" [className]="'p-6'">
    <div *ngIf="loading" class="flex justify-center p-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div>
    </div>

    <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

      <!-- Header and Action Buttons -->
      <div class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-100 dark:border-white/5 pb-5">
        
        <!-- Code Display -->
        <div class="flex items-center gap-2 px-3 py-2 bg-brand-50 dark:bg-brand-500/10 border border-brand-100 dark:border-brand-500/20 rounded-lg shadow-theme-xs">
          <svg class="w-4 h-4 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 7h.01M7 3h5c.512 0 1.024.195 1.414.586l7 7a2 2 0 010 2.828l-7 7a2 2 0 01-2.828 0l-7-7A1.994 1.994 0 013 12V7a4 4 0 014-4z" />
          </svg>
          <span class="text-xs font-semibold text-brand-600 dark:text-brand-400 uppercase tracking-wider">
            {{ 'common.code' | translate }}
          </span>
          <div class="w-px h-4 bg-brand-200 dark:bg-brand-500/30 mx-1"></div>
          <span class="font-mono text-sm font-bold text-gray-900 dark:text-white">
            {{ form.get('code')?.value || '---' }}
          </span>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center gap-3">
          <button type="button" (click)="onCancel()"
            class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-theme-xs hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition-colors">
            {{ (isView ? 'common.back' : 'common.cancel') | translate }}
          </button>

          <button *ngIf="!isView" type="submit" [disabled]="form.invalid || isSaving"
            class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-brand-500 rounded-lg shadow-theme-xs hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            <svg *ngIf="isSaving" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <span>{{ (isSaving ? 'common.saving' : 'common.save') | translate }}</span>
          </button>
        </div>
      </div>

      <!-- Names -->
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 pt-2">
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.arabicName' | translate }} <span class="text-error-500">*</span>
          </label>
          <input type="text" formControlName="aName" [readonly]="isView"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed': isView}" />
        </div>

        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.englishName' | translate }}
          </label>
          <input type="text" formControlName="eName" [readonly]="isView"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed': isView}" />
        </div>
      </div>

      <!-- Notes -->
      <div>
        <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">{{ 'common.notes' | translate }}</label>
        <textarea formControlName="notes" rows="4" [readonly]="isView"
          class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
          [ngClass]="{'bg-gray-50 cursor-not-allowed': isView}"></textarea>
      </div>

    </form>
  </app-component-card>
</div>
