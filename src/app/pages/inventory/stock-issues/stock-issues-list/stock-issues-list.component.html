<app-page-breadcrumb [pageTitle]="'stockVouchers.issues.title'" />
<div class="space-y-6">
  <app-crud-list 
    [pageTitle]="'stockVouchers.issues.list.title'" 
    [searchPlaceholder]="'common.search'"
    [addBtnText]="'stockVouchers.issues.addNew'"
    [columns]="columns" 
    [data]="data" 
    [filters]="{ pageNumber: pageNumber, pageSize: pageSize, searchValue: searchValue }"
    [isLoading]="loading"
    (search)="loadData()"
    (add)="onAdd()"
    (view)="onView($event)"
    (pageChange)="onPageChange($event)">
  </app-crud-list>
</div>
