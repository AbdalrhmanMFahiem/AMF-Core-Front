<app-modal [isOpen]="isOpen" (close)="onClose()" [className]="'max-w-xl'">
  <div class="px-6 py-4 border-b border-gray-100 dark:border-white/5 flex justify-between items-center bg-white dark:bg-gray-900 rounded-t-2xl">
    <h3 class="text-lg font-medium text-gray-800 dark:text-white/90">
      {{ 'salesInvoices.addPayment' | translate }}
    </h3>
    <button (click)="onClose()" class="text-gray-400 hover:text-gray-500 focus:outline-none">
      <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="p-6 bg-white dark:bg-gray-900 rounded-b-2xl">
    <div *ngIf="errors.length > 0" class="mb-4 p-4 bg-error-50 text-error-800 rounded-lg dark:bg-error-500/10 dark:text-error-400 text-sm">
      <ul class="list-disc pl-5">
        <li *ngFor="let err of errors">{{ err }}</li>
      </ul>
    </div>

    <form (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-4">
      <div class="p-4 bg-brand-50 dark:bg-brand-500/10 rounded-lg flex justify-between mb-4">
        <div>
          <p class="text-xs text-brand-600 dark:text-brand-400 font-medium">{{ 'salesInvoices.fields.invoice' | translate }}</p>
          <p class="font-semibold text-gray-900 dark:text-white">{{ invoice?.code }}</p>
        </div>
        <div class="text-right">
          <p class="text-xs text-brand-600 dark:text-brand-400 font-medium">{{ 'salesInvoices.fields.remainingAmount' | translate }}</p>
          <p class="font-semibold text-gray-900 dark:text-white">{{ invoice?.remainingAmount | number:'1.2-2' }}</p>
        </div>
      </div>

      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'salesInvoices.fields.amount' | translate }} <span class="text-error-500">*</span>
          </label>
          <input type="number" [(ngModel)]="model.amount" name="amount" required min="0.01" [max]="invoice?.remainingAmount || 0"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:text-white/90" />
        </div>
        <div>
          <label class="mb-2 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'salesInvoices.fields.paymentDate' | translate }} <span class="text-error-500">*</span>
          </label>
          <input type="date" [(ngModel)]="model.paymentDate" name="paymentDate" required
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:text-white/90" />
        </div>
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-gray-800 dark:text-white/90">
          {{ 'salesInvoices.fields.paymentMethod' | translate }} <span class="text-error-500">*</span>
        </label>
        <app-searchable-select [(ngModel)]="model.method" name="method" required
          [options]="paymentMethodOptions" placeholder="Common.Select">
        </app-searchable-select>
      </div>

      <div *ngIf="model.method === 'BankTransfer' || model.method === 'Cheque'" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div class="sm:col-span-2">
          <label class="mb-2 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'salesInvoices.fields.reference' | translate }}
          </label>
          <input type="text" [(ngModel)]="model.reference" name="reference"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:text-white/90" />
        </div>
        <!-- Note: We could add BankId and BankBranchId here if they were available via lookups -->
      </div>

      <div>
        <label class="mb-2 block text-sm font-medium text-gray-800 dark:text-white/90">
          {{ 'Common.Notes' | translate }}
        </label>
        <textarea [(ngModel)]="model.notes" name="notes" rows="2"
          class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:text-white/90"></textarea>
      </div>

      <div class="flex justify-end gap-3 pt-4 border-t border-gray-100 dark:border-gray-800 mt-6">
        <button type="button" (click)="onClose()"
          class="px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-theme-xs hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition-colors">
          {{ 'Common.cancel' | translate }}
        </button>
        <button type="submit" [disabled]="loading || !form.valid"
          class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-white bg-brand-500 rounded-lg shadow-theme-xs hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg *ngIf="loading" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          {{ 'Common.save' | translate }}
        </button>
      </div>
    </form>
  </div>
</app-modal>
