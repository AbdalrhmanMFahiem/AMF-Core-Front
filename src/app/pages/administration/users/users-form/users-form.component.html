<app-page-breadcrumb [pageTitle]="(isViewMode ? 'users.view' : (id ? 'users.edit' : 'users.add')) | translate"
  parentPageTitle="users.title" parentPageUrl="/administration/users" />

<div class="space-y-6">
  <app-success-redirect-banner [isVisible]="successMode" [message]="'Common.savedSuccessfully'"
    [redirectUrl]="'/administration/users'" [countdownSeconds]="5" (stay)="successMode = false">
  </app-success-redirect-banner>

  <app-component-card [title]="(isViewMode ? 'users.view' : (id ? 'users.edit' : 'users.add')) | translate"
    [className]="'p-6'">

    <div *ngIf="loading" class="flex justify-center p-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div>
    </div>

    <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()" class="space-y-6">

      <!-- Header and Action Buttons -->
      <div class="flex flex-wrap items-center justify-between gap-4 border-b border-gray-100 dark:border-white/5 pb-5">

        <!-- User Code -->
        <div
          class="flex items-center gap-2 px-3 py-2 bg-brand-50 dark:bg-brand-500/10 border border-brand-100 dark:border-brand-500/20 rounded-lg shadow-theme-xs">
          <svg class="w-4 h-4 text-brand-600 dark:text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
          </svg>
          <span class="text-xs font-semibold text-brand-600 dark:text-brand-400 uppercase tracking-wider">
            {{ 'users.fields.code' | translate }}
          </span>
          <div class="w-px h-4 bg-brand-200 dark:bg-brand-500/30 mx-1"></div>
          <span class="font-mono text-sm font-bold text-gray-900 dark:text-white">
            {{ basicForm.get('code')?.value || '---' }}
          </span>
        </div>

        <!-- Action Buttons -->
        <div class="flex items-center gap-3">
          <button type="button" (click)="onCancel()"
            class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-theme-xs hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition-colors">
            {{ (isViewMode ? 'Common.back' : 'Common.cancel') | translate }}
          </button>

          <button *ngIf="!isViewMode" type="submit" [disabled]="saving || form.invalid"
            class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-brand-500 rounded-lg shadow-theme-xs hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            <svg *ngIf="saving" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none"
              viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
              <path class="opacity-75" fill="currentColor"
                d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
              </path>
            </svg>
            <span>{{ (saving ? 'Common.Saving' : 'Common.save') | translate }}</span>
          </button>
        </div>
      </div>

      <!-- Tabs Navigation -->
      <div class="border-b border-gray-200 dark:border-gray-800 mt-6">
        <nav class="-mb-px flex space-x-6 overflow-x-auto" aria-label="Tabs">
          <button type="button" (click)="activeTab = 'basic'" [class.border-brand-500]="activeTab === 'basic'"
            [class.text-brand-600]="activeTab === 'basic'" [class.border-transparent]="activeTab !== 'basic'"
            [class.text-gray-500]="activeTab !== 'basic'" [class.hover:text-gray-700]="activeTab !== 'basic'"
            [class.hover:border-gray-300]="activeTab !== 'basic'"
            class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center">
            {{ 'users.tabs.basicInfo' | translate }}
          </button>

          <button type="button" (click)="activeTab = 'employment'"
            [class.border-brand-500]="activeTab === 'employment'"
            [class.text-brand-600]="activeTab === 'employment'"
            [class.border-transparent]="activeTab !== 'employment'"
            [class.text-gray-500]="activeTab !== 'employment'"
            class="whitespace-nowrap pb-4 px-1 border-b-2 font-medium text-sm transition-colors flex items-center hover:text-gray-700 hover:border-gray-300">
            {{ 'users.tabs.employmentInfo' | translate }}
          </button>
        </nav>
      </div>

      <!-- Basic Info Tab -->
      <div *ngIf="activeTab === 'basic'" formGroupName="basic" class="space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          
          <!-- Photo Upload -->
          <div class="col-span-full mb-2">
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.photo' | translate }}
            </label>
            <div class="flex items-center gap-4">
              <div class="h-24 w-24 rounded-full overflow-hidden border border-gray-200 dark:border-gray-700 flex items-center justify-center bg-gray-50 dark:bg-gray-800/50 shadow-theme-xs">
                <img *ngIf="photoPreview" [src]="photoPreview" alt="Profile" class="h-full w-full object-cover">
                <svg *ngIf="!photoPreview" class="h-10 w-10 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                </svg>
              </div>
              <div *ngIf="!isViewMode" class="flex flex-col gap-2">
                <label class="cursor-pointer flex items-center gap-2 px-4 py-2 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-theme-xs hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition-colors">
                  <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/></svg>
                  Upload
                  <input type="file" accept="image/*" class="hidden" (change)="onFileChange($event)">
                </label>
                <button *ngIf="photoPreview" type="button" (click)="removePhoto()" class="flex items-center justify-center gap-2 px-4 py-2 text-sm font-medium text-error-600 bg-error-50 border border-error-200 rounded-lg shadow-theme-xs hover:bg-error-100 dark:bg-error-500/10 dark:border-error-500/20 dark:hover:bg-error-500/20 transition-colors">
                  Remove
                </button>
              </div>
            </div>
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.code' | translate }} <span class="text-error-500">*</span>
            </label>
            <input formControlName="code" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.firstPrimaryName' | translate }} <span class="text-error-500">*</span>
            </label>
            <input formControlName="firstPrimaryName" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.lastPrimaryName' | translate }} <span class="text-error-500">*</span>
            </label>
            <input formControlName="lastPrimaryName" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.firstForeignName' | translate }}
            </label>
            <input formControlName="firstForeignName" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.lastForeignName' | translate }}
            </label>
            <input formControlName="lastForeignName" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.email' | translate }} <span class="text-error-500">*</span>
            </label>
            <input formControlName="email" type="email"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div *ngIf="!isViewMode">
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.fields.password' | translate }}
            </label>
            <input formControlName="password" type="password"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>
        </div>

        <!-- Notes Section -->
        <div class="mt-6">
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'users.fields.notes' | translate }}
          </label>
          <textarea formControlName="notes" rows="2"
            class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed"></textarea>
        </div>

        <!-- Checkboxes -->
        <div class="flex flex-wrap items-center gap-6 mt-4 pt-4 border-t border-gray-100 dark:border-gray-800">
          <div class="flex items-center">
            <input formControlName="isActive" type="checkbox" id="isActive" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 disabled:opacity-60">
            <label for="isActive" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{ 'users.fields.isActive' | translate }}</label>
          </div>
          
          <div class="flex items-center">
            <input formControlName="changePassword" type="checkbox" id="changePassword" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 disabled:opacity-60">
            <label for="changePassword" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{ 'users.fields.changePassword' | translate }}</label>
          </div>

          <div class="flex items-center">
            <input formControlName="lockAccess" type="checkbox" id="lockAccess" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 disabled:opacity-60">
            <label for="lockAccess" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{ 'users.fields.lockAccess' | translate }}</label>
          </div>
        </div>
      </div>

      <!-- Employment Info Tab -->
      <div *ngIf="activeTab === 'employment'" formGroupName="employment" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.birthDate' | translate }} <span class="text-error-500">*</span>
            </label>
            <app-date-picker id="birthDate" formControlName="birthDate" [placeholder]="'Common.selectDate' | translate"></app-date-picker>
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.gender' | translate }} <span class="text-error-500">*</span>
            </label>
            <div class="flex flex-wrap items-center gap-4">
              <!-- Male Option -->
              <label class="group relative flex items-center p-2.5 rounded-xl border border-gray-200 bg-white/50 dark:border-gray-800 dark:bg-gray-900/50 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 has-checked:border-brand-500/50 has-checked:bg-brand-50 dark:has-checked:bg-brand-500/10 dark:has-checked:border-brand-500/30 transition-all flex-1 sm:flex-none justify-center sm:justify-start shadow-theme-xs">
                <input type="radio" formControlName="gender" [value]="1" class="sr-only">
                <div class="w-5 h-5 rounded-full border-2 border-gray-300 dark:border-gray-600 group-has-checked:border-brand-500 group-has-checked:border-[6px] mr-3 ml-3 rtl:mr-0 rtl:ml-3 shrink-0 transition-all shadow-sm"></div>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-has-checked:text-brand-700 dark:group-has-checked:text-brand-300 pr-3 rtl:pr-0 rtl:pl-3 transition-colors">
                  {{ 'users.employment.male' | translate }}
                </span>
              </label>

              <!-- Female Option -->
              <label class="group relative flex items-center p-2.5 rounded-xl border border-gray-200 bg-white/50 dark:border-gray-800 dark:bg-gray-900/50 cursor-pointer hover:bg-gray-50 dark:hover:bg-gray-800 has-checked:border-pink-500/50 has-checked:bg-pink-50 dark:has-checked:bg-pink-500/10 dark:has-checked:border-pink-500/30 transition-all flex-1 sm:flex-none justify-center sm:justify-start shadow-theme-xs">
                <input type="radio" formControlName="gender" [value]="2" class="sr-only">
                <div class="w-5 h-5 rounded-full border-2 border-gray-300 dark:border-gray-600 group-has-checked:border-pink-500 group-has-checked:border-[6px] mr-3 ml-3 rtl:mr-0 rtl:ml-3 shrink-0 transition-all shadow-sm"></div>
                <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-has-checked:text-pink-700 dark:group-has-checked:text-pink-300 pr-3 rtl:pr-0 rtl:pl-3 transition-colors">
                  {{ 'users.employment.female' | translate }}
                </span>
              </label>
            </div>
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.nationalId' | translate }}
            </label>
            <input formControlName="nationalId" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.hardAnnualLeave' | translate }} <span class="text-error-500">*</span>
            </label>
            <input formControlName="hardAnnualLeave" type="number"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.balanceDueDate' | translate }}
            </label>
            <app-date-picker id="balanceDueDate" formControlName="balanceDueDate" [placeholder]="'Common.selectDate' | translate"></app-date-picker>
          </div>

          <div class="flex flex-col justify-end pb-2 gap-4">
            <div class="flex items-center">
              <input formControlName="haveBalance" type="checkbox" id="haveBalance" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 disabled:opacity-60">
              <label for="haveBalance" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{ 'users.employment.haveBalance' | translate }}</label>
            </div>
            
            <div class="flex items-center">
              <input formControlName="isDeployed" type="checkbox" id="isDeployed" class="w-4 h-4 text-brand-600 bg-gray-100 border-gray-300 rounded focus:ring-brand-500 dark:focus:ring-brand-600 dark:ring-offset-gray-800 focus:ring-2 dark:bg-gray-700 dark:border-gray-600 disabled:opacity-60">
              <label for="isDeployed" class="ms-2 text-sm font-medium text-gray-900 dark:text-gray-300">{{ 'users.employment.isDeployed' | translate }}</label>
            </div>
          </div>

          <div class="col-span-full mt-4">
            <h4 class="text-lg font-semibold text-gray-900 dark:text-white">{{ 'users.employment.address' | translate }}</h4>
            <div class="h-px w-full bg-gray-200 dark:bg-gray-700 mt-2"></div>
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.addressLine1' | translate }}
            </label>
            <input formControlName="addressLine1" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>
          
          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.city' | translate }}
            </label>
            <input formControlName="city" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>

          <div>
            <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
              {{ 'users.employment.country' | translate }}
            </label>
            <input formControlName="country" type="text"
              class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800 disabled:opacity-60 disabled:cursor-not-allowed" />
          </div>
        </div>
      </div>
    </form>
  </app-component-card>
</div>

<app-error-banner [isVisible]="validationErrors.length > 0" [errors]="validationErrors"
  (close)="validationErrors = []"></app-error-banner>
