<div class="space-y-6 relative">
  <!-- Loading overlay for the whole form -->
  <div *ngIf="loading" class="absolute inset-0 bg-base-100 bg-opacity-75 z-50 flex justify-center items-center rounded-xl">
    <span class="loading loading-spinner loading-lg text-primary"></span>
  </div>

  <app-page-breadcrumb
    [pageTitle]="breadcrumbTitle"
    [parentPageTitle]="'common.branches' | translate"
    parentPageUrl="/administration/branches">
  </app-page-breadcrumb>

  <div class="card bg-base-100 shadow-xl">
    <div class="card-body">
      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <!-- Code -->
          <div class="form-control w-full">
            <label class="label"><span class="label-text">{{ 'common.code' | translate }} <span class="text-error">*</span></span></label>
            <input type="text" formControlName="code" class="input input-bordered w-full"
                   [class.input-error]="form.get('code')?.invalid && form.get('code')?.touched" />
          </div>

          <!-- AName -->
          <div class="form-control w-full">
            <label class="label"><span class="label-text">{{ 'common.aName' | translate }} <span class="text-error">*</span></span></label>
            <input type="text" formControlName="aName" class="input input-bordered w-full"
                   [class.input-error]="form.get('aName')?.invalid && form.get('aName')?.touched" />
          </div>

          <!-- EName -->
          <div class="form-control w-full">
            <label class="label"><span class="label-text">{{ 'common.eName' | translate }}</span></label>
            <input type="text" formControlName="eName" class="input input-bordered w-full" />
          </div>

          <!-- Parent Branch -->
          <div class="form-control w-full">
            <label class="label"><span class="label-text">{{ 'common.parentBranch' | translate }}</span></label>
            <app-searchable-select
              formControlName="parentBranchId"
              [options]="branches"
              [placeholder]="'common.select' | translate"
              [disabled]="mode === 'view'">
            </app-searchable-select>
          </div>
        </div>

        <div class="form-control">
          <label class="label cursor-pointer justify-start gap-4">
            <input type="checkbox" formControlName="isDefault" class="checkbox checkbox-primary" />
            <span class="label-text font-medium">{{ 'common.isDefault' | translate }}</span>
          </label>
        </div>

        <div class="form-control w-full">
          <label class="label"><span class="label-text">{{ 'common.notes' | translate }}</span></label>
          <textarea formControlName="notes" class="textarea textarea-bordered h-24" placeholder="{{ 'common.notes' | translate }}"></textarea>
        </div>

        <!-- Action Buttons -->
        <div class="flex justify-end gap-3 mt-8 pt-6 border-t border-base-300">
          <button type="button" class="btn btn-outline" (click)="onCancel()">
            {{ (mode === 'view' ? 'common.back' : 'common.cancel') | translate }}
          </button>
          
          <button *ngIf="mode !== 'view'" type="submit" class="btn btn-primary min-w-[120px]" [disabled]="form.invalid || saving">
            <span *ngIf="saving" class="loading loading-spinner loading-sm"></span>
            {{ 'common.save' | translate }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
