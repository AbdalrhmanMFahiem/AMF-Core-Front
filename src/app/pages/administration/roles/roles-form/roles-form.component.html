<app-page-breadcrumb [pageTitle]="id ? (isViewMode ? 'roles.view' : 'roles.edit') : 'roles.add' | translate"></app-page-breadcrumb>

<app-success-redirect-banner
  *ngIf="successMode"
  [redirectUrl]="'/administration/roles'"
></app-success-redirect-banner>

<div *ngIf="!successMode" class="rounded-sm border border-stroke bg-white shadow-default dark:border-strokedark dark:bg-boxdark">
  <div class="border-b border-stroke py-4 px-6.5 dark:border-strokedark">
    <h3 class="font-medium text-black dark:text-white">
      {{ (id ? (isViewMode ? 'roles.view' : 'roles.edit') : 'roles.add') | translate }}
    </h3>
  </div>
  
  <div *ngIf="loading" class="p-6.5 text-center text-primary">
    {{ 'common.loading' | translate }}
  </div>

  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="save()">
    <div class="p-6.5">
      
      <!-- Basic Info -->
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
        <div>
          <label class="mb-3 block text-sm font-medium text-black dark:text-white">
            {{ 'roles.fields.aName' | translate }} <span class="text-meta-1">*</span>
          </label>
          <input formControlName="aName" type="text"
                 class="w-full rounded border-[1.5px] border-stroke bg-transparent py-3 px-5 text-black outline-none transition focus:border-primary active:border-primary disabled:cursor-default disabled:bg-whiter dark:border-form-strokedark dark:bg-form-input dark:text-white dark:focus:border-primary" />
          <div *ngIf="form.get('aName')?.invalid && form.get('aName')?.touched" class="text-meta-1 mt-1 text-sm">
            {{ 'Common.ErrorTitle' | translate }}
          </div>
        </div>

        <div>
          <label class="mb-3 block text-sm font-medium text-black dark:text-white">
            {{ 'roles.fields.eName' | translate }}
          </label>
          <input formControlName="eName" type="text"
                 class="w-full rounded border-[1.5px] border-stroke bg-transparent py-3 px-5 text-black outline-none transition focus:border-primary active:border-primary disabled:cursor-default disabled:bg-whiter dark:border-form-strokedark dark:bg-form-input dark:text-white dark:focus:border-primary" />
        </div>

        <div class="md:col-span-2">
          <label class="mb-3 block text-sm font-medium text-black dark:text-white">
            {{ 'roles.fields.notes' | translate }}
          </label>
          <textarea formControlName="notes" rows="3"
                    class="w-full rounded border-[1.5px] border-stroke bg-transparent py-3 px-5 text-black outline-none transition focus:border-primary active:border-primary disabled:cursor-default disabled:bg-whiter dark:border-form-strokedark dark:bg-form-input dark:text-white dark:focus:border-primary"></textarea>
        </div>
      </div>

      <!-- Permissions Tree -->
      <div class="border-t border-stroke dark:border-strokedark pt-6">
        <div class="flex justify-between items-center mb-4">
          <h4 class="text-lg font-semibold text-black dark:text-white">{{ 'roles.permissions' | translate }}</h4>
          <div class="flex gap-2">
            <button type="button" (click)="expandAll()" class="text-sm text-primary hover:underline">{{ 'roles.expandAll' | translate }}</button>
            <button type="button" (click)="collapseAll()" class="text-sm text-primary hover:underline">{{ 'roles.collapseAll' | translate }}</button>
          </div>
        </div>

        <div class="bg-gray-2 dark:bg-meta-4 rounded-md p-4 max-h-115 overflow-y-auto">
          <!-- Recursive Template for Tree Nodes -->
          <ng-template #nodeTemplate let-nodes="nodes" let-level="level">
            <ul class="list-none m-0 p-0" [ngClass]="{'pl-6': level > 0, 'border-l border-stroke dark:border-strokedark': level > 0}">
              <li *ngFor="let node of nodes" class="mb-2">
                <div class="flex items-center gap-2 py-1">
                  <!-- Expand/Collapse Button -->
                  <button type="button" *ngIf="(node.children && node.children.length > 0) || (node.permissions && node.permissions.length > 0)" 
                          (click)="toggleNodeCollapse(node)" class="text-gray-500 hover:text-primary focus:outline-none w-5 text-center">
                    <span *ngIf="node.collapsed">▶</span>
                    <span *ngIf="!node.collapsed">▼</span>
                  </button>
                  <span *ngIf="!(node.children?.length) && !(node.permissions?.length)" class="w-5"></span>

                  <!-- Node Checkbox -->
                  <label class="flex items-center cursor-pointer select-none">
                    <input type="checkbox" class="sr-only peer" 
                           [checked]="isNodeFullySelected(node)"
                           [disabled]="isViewMode"
                           (change)="onNodeToggle(node, $event)" />
                    <div class="mr-2 flex h-5 w-5 items-center justify-center rounded border border-stroke bg-white dark:border-strokedark dark:bg-boxdark"
                         [ngClass]="{
                            'bg-primary border-primary': isNodeFullySelected(node), 
                            'bg-opacity-50 bg-primary border-primary': isNodePartiallySelected(node) && !isNodeFullySelected(node)
                         }">
                      <span class="opacity-0 peer-checked:opacity-100" [ngClass]="{'opacity-100': isNodePartiallySelected(node)}">
                        <svg width="11" height="8" viewBox="0 0 11 8" fill="none" xmlns="http://www.w3.org/2000/svg" *ngIf="isNodeFullySelected(node)">
                          <path d="M10.0915 0.951972L10.0867 0.946075L10.0813 0.940568C9.90076 0.753564 9.61034 0.753146 9.42927 0.939309L4.16201 6.22962L1.58507 3.63469C1.40401 3.44841 1.11351 3.44879 0.932892 3.63584C0.755703 3.81933 0.755703 4.10875 0.932892 4.29224L0.932878 4.29225L0.934851 4.29424L3.58046 6.95832C3.73676 7.11955 3.94983 7.2 4.1473 7.2C4.36196 7.2 4.55963 7.11773 4.71406 6.9584L10.0468 1.60234C10.2436 1.4199 10.2421 1.1339 10.0915 0.951972Z" fill="white" stroke="white" stroke-width="0.2"></path>
                        </svg>
                        <div *ngIf="isNodePartiallySelected(node) && !isNodeFullySelected(node)" class="w-2 h-0.5 bg-white"></div>
                      </span>
                    </div>
                    <span class="text-sm font-medium text-black dark:text-white" [ngClass]="{'font-bold': level === 0}">{{ node.displayName }}</span>
                  </label>
                </div>

                <!-- Children / Permissions -->
                <div *ngIf="!node.collapsed">
                  <!-- Render sub-nodes -->
                  <ng-container *ngIf="node.children && node.children.length > 0">
                    <ng-container *ngTemplateOutlet="nodeTemplate; context:{nodes: node.children, level: level + 1}"></ng-container>
                  </ng-container>

                  <!-- Render direct permissions -->
                  <ul *ngIf="node.permissions && node.permissions.length > 0" class="list-none m-0 pl-10 pt-2 pb-3">
                    <li *ngFor="let p of node.permissions" class="mb-2">
                      <label class="flex items-center cursor-pointer select-none">
                        <input type="checkbox" class="sr-only peer" 
                               [checked]="isPermissionSelected(p.key)"
                               [disabled]="isViewMode"
                               (change)="onPermissionToggle(p.key, $event)" />
                        <div class="mr-2 flex h-5 w-5 items-center justify-center rounded border border-stroke bg-white dark:border-strokedark dark:bg-boxdark peer-checked:bg-primary peer-checked:border-primary">
                          <span class="opacity-0 peer-checked:opacity-100">
                            <svg width="11" height="8" viewBox="0 0 11 8" fill="none" xmlns="http://www.w3.org/2000/svg">
                              <path d="M10.0915 0.951972L10.0867 0.946075L10.0813 0.940568C9.90076 0.753564 9.61034 0.753146 9.42927 0.939309L4.16201 6.22962L1.58507 3.63469C1.40401 3.44841 1.11351 3.44879 0.932892 3.63584C0.755703 3.81933 0.755703 4.10875 0.932892 4.29224L0.932878 4.29225L0.934851 4.29424L3.58046 6.95832C3.73676 7.11955 3.94983 7.2 4.1473 7.2C4.36196 7.2 4.55963 7.11773 4.71406 6.9584L10.0468 1.60234C10.2436 1.4199 10.2421 1.1339 10.0915 0.951972Z" fill="white" stroke="white" stroke-width="0.2"></path>
                            </svg>
                          </span>
                        </div>
                        <span class="text-sm text-gray-700 dark:text-gray-300">{{ p.displayName }}</span>
                      </label>
                    </li>
                  </ul>
                </div>
              </li>
            </ul>
          </ng-template>

          <ng-container *ngTemplateOutlet="nodeTemplate; context:{nodes: permissionsTree, level: 0}"></ng-container>
        </div>
      </div>

    </div>

    <!-- Actions -->
    <div class="border-t border-stroke py-4 px-6.5 dark:border-strokedark flex justify-end gap-4">
      <button type="button" (click)="onCancel()"
              class="flex justify-center rounded border border-stroke py-2 px-6 font-medium text-black hover:shadow-1 dark:border-strokedark dark:text-white">
        {{ (isViewMode ? 'common.back' : 'common.cancel') | translate }}
      </button>
      <button *ngIf="!isViewMode" type="submit" [disabled]="saving"
              class="flex justify-center rounded bg-primary py-2 px-6 font-medium text-gray hover:bg-opacity-90 disabled:opacity-50">
        {{ (saving ? 'common.saving' : 'common.save') | translate }}
      </button>
    </div>
  </form>
</div>
