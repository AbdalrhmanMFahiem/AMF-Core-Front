<div class="grid grid-cols-12 gap-4 md:gap-6">
  <div class="col-span-12 space-y-6 xl:col-span-7">
    <div>
      <app-ecommerce-metrics [metrics]="metrics" *ngIf="!loadingMetrics" />
      <div *ngIf="loadingMetrics" class="animate-pulse bg-gray-200 dark:bg-gray-800 h-32 rounded-2xl w-full"></div>
    </div>

    <div>
      <app-monthly-sales-chart [chartData]="chartData" *ngIf="!loadingChart" />
      <div *ngIf="loadingChart" class="animate-pulse bg-gray-200 dark:bg-gray-800 h-64 rounded-2xl w-full"></div>
    </div>
  </div>

  <div class="col-span-12 xl:col-span-5">
    <app-monthly-target />
  </div>

  <div class="col-span-12">
    <app-statics-chart />
  </div>

  <div class="col-span-12 xl:col-span-5">
    <app-demographic-card />
  </div>

  <div class="col-span-12 xl:col-span-7">
    <app-recent-orders [transactions]="recentTransactions" *ngIf="!loadingTransactions" />
    <div *ngIf="loadingTransactions" class="animate-pulse bg-gray-200 dark:bg-gray-800 h-64 rounded-2xl w-full"></div>
  </div>
</div>
