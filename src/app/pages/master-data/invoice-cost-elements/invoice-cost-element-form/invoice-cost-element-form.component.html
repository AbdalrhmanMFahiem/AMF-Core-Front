<app-page-breadcrumb
  [pageTitle]="(mode === 'edit' ? 'invoiceCostElements.edit' : mode === 'view' ? 'common.view' : 'invoiceCostElements.addNew')" />

<div class="space-y-6">
  <app-success-redirect-banner [isVisible]="saveSuccess" [message]="'common.savedSuccessfully'"
    [redirectUrl]="'/inventory/invoice-cost-elements'" [countdownSeconds]="5"
    (stay)="saveSuccess = false">
  </app-success-redirect-banner>

  <app-component-card
    [title]="(mode === 'edit' ? 'invoiceCostElements.edit' : mode === 'view' ? 'common.view' : 'invoiceCostElements.addNew') | translate"
    [className]="'p-6'">

    <div *ngIf="loading" class="flex justify-center p-8">
      <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-500"></div>
    </div>

    <form *ngIf="!loading" (ngSubmit)="onSubmit()" #form="ngForm" class="space-y-6">
      
      <div class="grid grid-cols-1 gap-6 sm:grid-cols-2">
        <!-- Code -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.code' | translate }} <span class="text-error-500">*</span>
          </label>
          <input type="text" [(ngModel)]="model.code" name="code" required [disabled]="mode === 'view'"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed opacity-60': mode === 'view'}" />
        </div>

        <!-- Type -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.type' | translate }} <span class="text-error-500">*</span>
          </label>
          <app-searchable-select [(ngModel)]="model.type" name="type" required [options]="typeOptions"
            [disabled]="mode === 'view'" placeholder="common.select">
          </app-searchable-select>
        </div>

        <!-- Arabic Name -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.arabicName' | translate }} <span class="text-error-500">*</span>
          </label>
          <input type="text" [(ngModel)]="model.aName" name="aName" required [disabled]="mode === 'view'"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed opacity-60': mode === 'view'}" />
        </div>

        <!-- English Name -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'common.englishName' | translate }}
          </label>
          <input type="text" [(ngModel)]="model.eName" name="eName" [disabled]="mode === 'view'"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed opacity-60': mode === 'view'}" />
        </div>

        <!-- Operation Type -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'invoiceCostElements.fields.operationType' | translate }} <span class="text-error-500">*</span>
          </label>
          <app-searchable-select [(ngModel)]="model.operationType" name="operationType" required [options]="operationTypeOptions"
            [disabled]="mode === 'view'" placeholder="common.select">
          </app-searchable-select>
        </div>

        <!-- Default Percentage -->
        <div>
          <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
            {{ 'invoiceCostElements.fields.defaultPercentage' | translate }}
          </label>
          <input type="number" [(ngModel)]="model.defaultPercentage" name="defaultPercentage" [disabled]="mode === 'view'"
            step="0.01" min="0"
            class="dark:bg-dark-900 h-11 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
            [ngClass]="{'bg-gray-50 cursor-not-allowed opacity-60': mode === 'view'}" />
        </div>
      </div>

      <!-- Notes -->
      <div>
        <label class="mb-2.5 block text-sm font-medium text-gray-800 dark:text-white/90">
          {{ 'common.notes' | translate }}
        </label>
        <textarea [(ngModel)]="model.notes" name="notes" rows="4" [disabled]="mode === 'view'"
          class="dark:bg-dark-900 w-full rounded-lg border border-gray-200 bg-transparent py-2.5 px-4 text-sm text-gray-800 shadow-theme-xs placeholder:text-gray-400 focus:border-brand-300 focus:outline-hidden focus:ring-3 focus:ring-brand-500/10 dark:border-gray-800 dark:bg-white/3 dark:text-white/90 dark:placeholder:text-white/30 dark:focus:border-brand-800"
          [ngClass]="{'bg-gray-50 cursor-not-allowed opacity-60': mode === 'view'}"></textarea>
      </div>

      <!-- Action Buttons -->
      <div class="flex justify-end gap-3 border-t border-gray-100 dark:border-white/5 pt-6">
        <button type="button" (click)="onCancel()"
          class="px-5 py-2.5 text-sm font-medium text-gray-700 bg-white border border-gray-300 rounded-lg shadow-theme-xs hover:bg-gray-50 dark:bg-gray-800 dark:text-gray-300 dark:border-gray-700 dark:hover:bg-gray-700 transition-colors">
          {{ (mode === 'view' ? 'common.back' : 'common.cancel') | translate }}
        </button>

        <button *ngIf="mode !== 'view'" type="submit" [disabled]="saving"
          class="flex items-center gap-2 px-5 py-2.5 text-sm font-medium text-white bg-brand-500 rounded-lg shadow-theme-xs hover:bg-brand-600 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
          <svg *ngIf="saving" class="h-4 w-4 animate-spin" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor"
              d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z">
            </path>
          </svg>
          <span>{{ (saving ? 'common.saving' : 'common.save') | translate }}</span>
        </button>
      </div>

    </form>
  </app-component-card>
</div>

<app-error-banner [isVisible]="validationErrors.length > 0" [errors]="validationErrors"
  (close)="validationErrors = []"></app-error-banner>
