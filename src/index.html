<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>AMF Core Systems</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <style>
    /* Initial loading screen shown before Angular bootstraps */
    .app-preloader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
      transition: opacity 0.4s ease-out;
    }

    .app-preloader.fade-out {
      opacity: 0;
      pointer-events: none;
    }

    .app-preloader-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      animation: preloader-slideUp 0.5s ease-out;
    }

    .preloader-ring {
      position: relative;
      width: 100px;
      height: 100px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .preloader-ring-outer {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #6366f1;
      border-right-color: #818cf8;
      animation: preloader-spin 1.2s linear infinite;
    }

    .preloader-ring-inner {
      position: absolute;
      inset: 8px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-bottom-color: #a78bfa;
      border-left-color: #c4b5fd;
      animation: preloader-spin 0.8s linear infinite reverse;
    }

    .preloader-logo {
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: 0.15em;
      background: linear-gradient(135deg, #818cf8, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .preloader-primary {
      font-size: 1.75rem;
      font-weight: 700;
      color: #f1f5f9;
      letter-spacing: 0.02em;
      text-align: center;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .preloader-secondary {
      font-size: 1rem;
      font-weight: 400;
      color: #94a3b8;
      letter-spacing: 0.04em;
      text-align: center;
      margin-top: -0.75rem;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .preloader-bar-container {
      width: 220px;
      height: 4px;
      background: #1e293b;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 0.5rem;
    }

    .preloader-bar {
      height: 100%;
      width: 40%;
      border-radius: 999px;
      background: linear-gradient(90deg, #6366f1, #a78bfa, #6366f1);
      background-size: 200% 100%;
      animation: preloader-shimmer 1.5s ease-in-out infinite, preloader-slideBar 1.8s ease-in-out infinite;
    }

    .preloader-text {
      font-size: 0.875rem;
      color: #64748b;
      letter-spacing: 0.06em;
      animation: preloader-pulse 1.5s ease-in-out infinite;
      font-family: system-ui, -apple-system, sans-serif;
    }

    @keyframes preloader-slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes preloader-spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes preloader-shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    @keyframes preloader-slideBar {
      0% {
        transform: translateX(-100%);
      }

      50% {
        transform: translateX(250%);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    @keyframes preloader-pulse {

      0%,
      100% {
        opacity: 0.6;
      }

      50% {
        opacity: 1;
      }
    }
  </style>
  <script>
    // Determine language-aware preloader content
    (function () {
      var lang = localStorage.getItem('lang') || 'en';
      var isAr = lang === 'ar';
      document.documentElement.lang = lang;
      document.documentElement.dir = isAr ? 'rtl' : 'ltr';
      // Store for the preloader text
      window.__preloaderLang = {
        primary: isAr ? 'نظام AMF الأساسي' : 'AMF Core Systems',
        secondary: isAr ? 'AMF Core Systems' : 'نظام AMF الأساسي',
        loading: isAr ? 'جاري التحميل...' : 'Loading...'
      };
    })();
  </script>
</head>

<body>
  <div id="app-preloader" class="app-preloader">
    <div class="app-preloader-content">
      <div class="preloader-ring">
        <div class="preloader-ring-outer"></div>
        <div class="preloader-ring-inner"></div>
        <div class="preloader-logo">AMF</div>
      </div>
      <h1 class="preloader-primary" id="preloader-primary"></h1>
      <p class="preloader-secondary" id="preloader-secondary"></p>
      <div class="preloader-bar-container">
        <div class="preloader-bar"></div>
      </div>
      <p class="preloader-text" id="preloader-text"></p>
    </div>
  </div>

  <script>
    // Fill preloader text based on language
    document.getElementById('preloader-primary').textContent = window.__preloaderLang.primary;
    document.getElementById('preloader-secondary').textContent = window.__preloaderLang.secondary;
    document.getElementById('preloader-text').textContent = window.__preloaderLang.loading;
  </script>

  <app-root></app-root>

  <script>
    // Hide preloader once Angular app is bootstrapped
    var checkReady = setInterval(function () {
      var root = document.querySelector('app-root');
      if (root && root.children.length > 0) {
        clearInterval(checkReady);
        var preloader = document.getElementById('app-preloader');
        if (preloader) {
          preloader.classList.add('fade-out');
          setTimeout(function () { preloader.remove(); }, 400);
        }
      }
    }, 100);
  </script>
</body>

</html>
